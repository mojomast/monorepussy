[project]
name = "ussyverse"
version = "2025.1.0"
description = "The Ussyverse — 50+ Python tools for code quality, security, and forensics"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "ussy-cli",
    "ussy-git",
    "ussy-ast",
    "ussy-sqlite",
    "ussy-report",
    "ussy-triage",
    "ussy-sentinel",
    "ussy-gridiron",
    "ussy-parliament",
    "ussy-stratax",
    "ussy-kintsugi",
    "ussy-assay",
    "ussy-petrichor",
    "ussy-snapshot",
    "ussy-churn",
    "ussy-steno",
    "ussy-calibre",
    "ussy-strata",
    "ussy-chromato",
    "ussy-cambium",
    "ussy-deps",
    "ussy-propriocept",
    "ussy-curator",
    "ussy-operon",
    "ussy-portmore",
    "ussy-syntrop",
    "ussy-fossilrecord",
    "ussy-telegrapha",
    "ussy-mushin",
    "ussy-gamut",
    "ussy-cyclone",
    "ussy-isobar",
    "ussy-circadia",
    "ussy-fatigue",
    "ussy-endemic",
    "ussy-stemma",
    "ussy-crystallo",
    "ussy-terrarium",
    "ussy-tarot",
    "ussy-actuary",
    "ussy-coroner",
    "ussy-mint",
    "ussy-dosemate",
    "ussy-cavity",
    "ussy-aquifer",
    "ussy-seral",
    "ussy-plan9webplumb",
    "ussy-reverseoracle",
    "ussy-timeloom",
]

[project.optional-dependencies]
sci = [
    "numpy>=1.24",
    "scipy>=1.10",
]
cli = [
    "click>=8.1",
    "rich>=13.0",
    "rich-click>=1.0",
]
git = [
    "gitpython>=3.1",
]
graph = [
    "networkx>=3.0",
]
web = [
    "requests>=2.25",
    "httpx>=0.24",
    "websockets>=11.0",
]
config = [
    "pyyaml>=6.0",
]
viz = [
    "matplotlib>=3.7",
]
compress = [
    "zstandard>=0.20",
]
mining = [
    "pydriller>=2.6",
]
all = [
    "ussyverse[sci,cli,git,graph,web,config,viz,compress,mining]",
]

[tool.uv.workspace]
members = [
    "packages/libs/*",
    "packages/tools/forensics/*",
    "packages/tools/security/*",
    "packages/tools/visualization/*",
    "packages/tools/quality/*",
    "packages/tools/deps/*",
    "packages/tools/triage/*",
    "packages/tools/governance/*",
    "packages/tools/devtools/*",
    "packages/tools/ussy-*",
    "packages/apps/*",
]
exclude = [
    "packages/archive",
]

[tool.uv.sources.ussy-core]
workspace = true

