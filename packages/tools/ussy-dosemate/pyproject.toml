[project]
name = "ussy-dosemate"
version = "0.1.0"
description = "Migrated from dosemate"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",

]

[project.scripts]
ussy-dosemate = "ussy_dosemate.cli:main"
dosemate = "ussy_dosemate.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_dosemate"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
