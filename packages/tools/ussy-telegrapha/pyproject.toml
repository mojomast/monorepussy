[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "telegrapha"
version = "0.1.0"
description = "Signal Corps Telegraphy for Data Pipeline Fidelity Analysis"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
telegrapha = "telegrapha.cli:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
