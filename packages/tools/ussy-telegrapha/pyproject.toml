[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-telegrapha"
version = "0.1.0"
description = "Signal Corps Telegraphy for Data Pipeline Fidelity Analysis"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-telegrapha = "ussy_telegrapha.cli:main"
telegrapha = "ussy_telegrapha.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_telegrapha"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
