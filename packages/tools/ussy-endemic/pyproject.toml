[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-endemic"
version = "0.1.0"
description = "Migrated from endemic"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-endemic = "ussy_endemic.cli:main"
endemic = "ussy_endemic.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_endemic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
