[project]
name = "ussy-timeloom"
version = "0.1.0"
description = "Migrated from timeloom"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "click>=8.0",
]

[project.scripts]
ussy-timeloom = "ussy_timeloom.cli:main"
timeloom = "ussy_timeloom.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_timeloom"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
