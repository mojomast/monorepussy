[project]
name = "ussy-mint"
version = "0.1.0"
description = "Migrated from mint"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",

]

[project.scripts]
ussy-mint = "ussy_mint.cli:main"
mint = "ussy_mint.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_mint"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
