[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-cyclone"
version = "0.1.0"
description = "Vorticity-based data pipeline anomaly detection"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-cyclone = "ussy_cyclone.cli:main"
cyclone = "ussy_cyclone.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_cyclone"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
