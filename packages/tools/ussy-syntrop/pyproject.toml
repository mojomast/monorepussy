[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-syntrop"
version = "0.1.0"
description = "Cross-language behavioral fuzzing via esolang compilation and semantic probes"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-syntrop = "ussy_syntrop.cli:main"
syntrop = "ussy_syntrop.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_syntrop"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
