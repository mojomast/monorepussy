[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-petrichor"
version = "0.1.0"
description = "Configuration drift detection through soil memory — layered history, pattern detection, and predictive drift"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-petrichor = "ussy_petrichor.cli:main"
petrichor = "ussy_petrichor.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_petrichor"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
