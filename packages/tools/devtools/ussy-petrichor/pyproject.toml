[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "petrichor"
version = "0.1.0"
description = "Configuration drift detection through soil memory — layered history, pattern detection, and predictive drift"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.scripts]
petrichor = "petrichor.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
