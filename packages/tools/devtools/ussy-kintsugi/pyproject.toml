[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-kintsugi"
version = "0.1.0"
description = "Visible Repair History That Makes Code Stronger at the Scars"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-kintsugi = "ussy_kintsugi.cli:main"
kintsugi = "ussy_kintsugi.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_kintsugi"]

[tool.uv.sources]
ussy-core = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]
