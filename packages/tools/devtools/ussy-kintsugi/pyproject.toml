[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kintsugi"
version = "0.1.0"
description = "Visible Repair History That Makes Code Stronger at the Scars"
requires-python = ">=3.9"

[project.scripts]
kintsugi = "kintsugi.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
