[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "snapshot"
version = "0.1.0"
description = "Freeze and thaw your entire development state — terminals, files, processes, environment, and mental context"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.scripts]
snapshot = "snapshot.cli:main"

[tool.setuptools.packages.find]
include = ["snapshot*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
