[project]
name = "ussy-aquifer"
version = "0.1.0"
description = "Migrated from aquifer"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "numpy>=1.24",
]

[project.scripts]
ussy-aquifer = "ussy_aquifer.cli:main"
aquifer = "ussy_aquifer.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_aquifer"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
