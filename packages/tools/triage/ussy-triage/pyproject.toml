[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-triage"
version = "1.0.0"
description = "Ussy Triage — Error Logs as Crime Scenes. Forensic methodology for build failure diagnosis."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [
    {name = "UssyCo"},
]
keywords = ["error", "diagnosis", "debugging", "cli", "forensic", "crime-scene", "ussyverse"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Debuggers",
    "Topic :: Software Development :: Testing",
    "Topic :: Utilities",
]
dependencies = [
    "ussy-core",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=4.0"]

[project.scripts]
ussy-triage = "ussy_triage.cli:main"
triage = "ussy_triage.legacy:triage_alias"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_triage"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "C4", "SIM"]
ignore = ["D100", "D104"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
