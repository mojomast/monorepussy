[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-stemma"
version = "0.1.0"
description = "Migrated from stemma"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-stemma = "ussy_stemma.cli:main"
stemma = "ussy_stemma.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_stemma"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
