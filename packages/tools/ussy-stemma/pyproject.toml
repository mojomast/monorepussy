[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stemma"
version = "0.1.0"
description = "Philological code variant reconstruction from textual evidence alone"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
stemma = "stemma.cli:main"

[tool.setuptools.packages.find]
include = ["stemma*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
