[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-propriocept"
version = "0.1.0"
description = "Proprioception and kinesthesia for developer environment awareness"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-propriocept = "ussy_propriocept.cli:main"
propriocept = "ussy_propriocept.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_propriocept"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
