[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-gamut"
version = "0.1.0"
description = "Color science gamut mapping for data pipeline fidelity analysis"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-gamut = "ussy_gamut.cli:main"
gamut = "ussy_gamut.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_gamut"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
