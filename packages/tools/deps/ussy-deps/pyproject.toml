[project]
name = "ussy-deps"
version = "2025.1.0"
description = "Meta-package for unified dependency analysis CLI"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "ussy-gridiron",
    "ussy-chromato",
    "ussy-cambium",
    "ussy-stratax",
]

[project.scripts]
ussy-deps = "ussy_deps.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_deps"]

[tool.uv.sources]
ussy-core = { workspace = true }
ussy-gridiron = { workspace = true }
ussy-chromato = { workspace = true }
ussy-cambium = { workspace = true }
ussy-stratax = { workspace = true }
