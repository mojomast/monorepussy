[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-chromato"
version = "0.1.0"
description = "Chromatographic dependency separation and profiling tool"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-chromato = "ussy_chromato.cli:main"
chromato = "ussy_chromato.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_chromato"]

[tool.uv.sources]
ussy-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
