[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chromato"
version = "0.1.0"
description = "Chromatographic dependency separation and profiling tool"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
chromato = "chromato.cli:main"

[tool.setuptools.packages.find]
include = ["chromato*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
