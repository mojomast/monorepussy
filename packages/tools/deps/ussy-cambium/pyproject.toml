[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-cambium"
version = "0.1.0"
description = "Horticultural grafting science for dependency compatibility analysis"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Cambium Contributors"}]
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-cambium = "ussy_cambium.cli:main"
cambium = "ussy_cambium.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_cambium"]

[tool.uv.sources]
ussy-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
