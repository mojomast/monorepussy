[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-gridiron"
version = "0.1.0"
description = "Power Grid Reliability Engineering for Dependency Ecosystem Health"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
    "ussy-report",
]

[project.scripts]
ussy-gridiron = "ussy_gridiron.cli:main"
gridiron = "ussy_gridiron.legacy:gridiron_alias"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_gridiron"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
