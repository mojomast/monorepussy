[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-terrarium"
version = "0.1.0"
description = "Migrated from terrarium"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "click>=8.0",
    "rich>=13.0",
    "ussy-core",
]

[project.scripts]
ussy-terrarium = "ussy_terrarium.cli:main"
terrarium = "ussy_terrarium.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_terrarium"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
