[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-portmore"
version = "0.1.0"
description = "Customs & Tariff Classification for Software License Compliance"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-portmore = "ussy_portmore.cli:main"
portmore = "ussy_portmore.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_portmore"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
