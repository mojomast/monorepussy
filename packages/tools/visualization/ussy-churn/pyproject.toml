[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-churn"
version = "0.1.0"
description = "Git co-change territory map generator"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydriller>=2.6",
    "networkx>=3.0",
    "scipy>=1.10",
    "rich>=13.0",
    "numpy>=1.24",
    "ussy-core",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]

[project.scripts]
ussy-churn = "ussy_churn.cli:main"
churnmap = "ussy_churn.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_churn"]

[tool.uv.sources]
ussy-core = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]
