[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "churnmap"
version = "0.1.0"
description = "Code change impact territory map generator"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydriller>=2.6",
  "networkx>=3.0",
  "scipy>=1.10",
  "rich>=13.0",
  "numpy>=1.24",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]

[project.scripts]
churnmap = "churnmap.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["churnmap*"]
