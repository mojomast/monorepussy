[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-curator"
version = "0.1.0"
description = "Library science for documentation health"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-curator = "ussy_curator.cli:main"
curator = "ussy_curator.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_curator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
