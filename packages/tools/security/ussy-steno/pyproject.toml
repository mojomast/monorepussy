[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-steno"
version = "1.0.0"
description = "Steganographic code review tool — detect invisible attacks in source code"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Ussyverse Contributors"}]
keywords = ["steganography", "code-review", "security", "unicode", "homoglyph", "trojan-source"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-steno = "ussy_steno.cli:main"
stenograph = "ussy_steno.legacy:stenograph_main"
stenography = "ussy_steno.legacy:stenography_main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_steno"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv.sources]
ussy-core = { workspace = true }
