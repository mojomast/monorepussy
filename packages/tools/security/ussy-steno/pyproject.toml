[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stenography"
version = "1.0.0"
description = "Steganographic code review tool — detect invisible attacks in source code"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [{name = "Stenography Contributors"}]
keywords = ["steganography", "code-review", "security", "unicode", "homoglyph", "trojan-source"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]

[project.scripts]
stenography = "stenography.cli:main"

[tool.setuptools.packages.find]
include = ["stenography*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
