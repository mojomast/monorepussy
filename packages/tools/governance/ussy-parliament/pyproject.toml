[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-parliament"
version = "0.1.0"
description = "Parliamentary Procedure for Agent Self-Governance"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Parliament Contributors"}
]
keywords = ["governance", "parliamentary-procedure", "agents", "ci-cd", "orchestration"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-parliament = "ussy_parliament.cli:main"
parliament = "ussy_parliament.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_parliament"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q --tb=short"
