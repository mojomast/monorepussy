[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sentinel"
version = "1.0.0"
description = "Immunological Self/Non-Self Code Governance using Negative Selection"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}

[project.scripts]
sentinel = "sentinel.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
