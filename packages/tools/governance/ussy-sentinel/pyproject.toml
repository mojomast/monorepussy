[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-sentinel"
version = "1.0.0"
description = "Immunological Self/Non-Self Code Governance using Negative Selection"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
    "ussy-ast",
]

[project.scripts]
ussy-sentinel = "ussy_sentinel.cli:main"
sentinel = "ussy_sentinel.legacy:sentinel_alias"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_sentinel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
