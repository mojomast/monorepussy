[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tarot"
version = "0.1.0"
description = "Probabilistic Risk Divination for Architecture Decisions"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.scripts]
tarot = "tarot.cli:main"

[tool.setuptools.packages.find]
include = ["tarot*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
