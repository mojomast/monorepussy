[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-tarot"
version = "0.1.0"
description = "Migrated from tarot"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-tarot = "ussy_tarot.cli:main"
tarot = "ussy_tarot.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_tarot"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
