[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-actuary"
version = "0.1.0"
description = "Migrated from actuary"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "ussy-core",
]

[project.scripts]
ussy-actuary = "ussy_actuary.cli:main"
actuary = "ussy_actuary.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_actuary"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
