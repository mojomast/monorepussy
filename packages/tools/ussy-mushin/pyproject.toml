[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-mushin"
version = "0.1.0"
description = "Persistent live workspace for code exploration — evaluation journal, workspace branching, spatial bookmarks"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-mushin = "ussy_mushin.cli:main"
mushin = "ussy_mushin.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_mushin"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
