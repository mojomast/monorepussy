[project]
name = "ussy-cavity"
version = "0.1.0"
description = "Migrated from cavity"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "numpy>=1.24",
    "pyyaml>=6.0",
]

[project.scripts]
ussy-cavity = "ussy_cavity.cli:main"
cavity = "ussy_cavity.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_cavity"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
