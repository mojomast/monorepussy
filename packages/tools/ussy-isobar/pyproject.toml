[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-isobar"
version = "0.1.0"
description = "Migrated from isobar"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-isobar = "ussy_isobar.cli:main"
isobar = "ussy_isobar.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_isobar"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
