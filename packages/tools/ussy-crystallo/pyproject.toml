[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-crystallo"
version = "0.1.0"
description = "Migrated from crystallo"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-crystallo = "ussy_crystallo.cli:main"
crystallo = "ussy_crystallo.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_crystallo"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
