[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "coroner"
version = "1.0.0"
description = "Forensic Trace Evidence Analysis for CI/CD Pipeline Failure Diagnosis"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = ["numpy>=1.24"]

[project.scripts]
coroner = "coroner.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
