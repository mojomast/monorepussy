[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-coroner"
version = "0.1.0"
description = "Migrated from coroner"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.24",
    "ussy-core",
]

[project.scripts]
ussy-coroner = "ussy_coroner.cli:main"
coroner = "ussy_coroner.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_coroner"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
