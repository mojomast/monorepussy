[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-operon"
version = "1.0.0"
description = "Gene Regulation for Documentation Generation"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-operon = "ussy_operon.cli:main"
operon = "ussy_operon.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_operon"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
