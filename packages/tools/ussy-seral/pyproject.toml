[project]
name = "ussy-seral"
version = "0.1.0"
description = "Migrated from seral"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
    "click>=8.0",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.scripts]
ussy-seral = "ussy_seral.cli:main"
seral = "ussy_seral.legacy:deprecated_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_seral"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
