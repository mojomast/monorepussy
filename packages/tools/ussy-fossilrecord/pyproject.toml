[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fossilrecord"
version = "0.1.0"
description = "Esolang stress testing for developer tools — mutation testing for tool robustness"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
keywords = ["esolang", "stress-testing", "developer-tools", "robustness", "fossil-score"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]

[project.scripts]
fossil = "fossilrecord.cli:main"

[tool.setuptools.packages.find]
include = ["fossilrecord*"]

[tool.setuptools.package-data]
"fossilrecord.corpus" = ["data/*.json", "data/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::pytest.PytestCollectionWarning",
]
