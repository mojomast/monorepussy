[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-fossilrecord"
version = "0.1.0"
description = "Esolang stress testing for developer tools — mutation testing for tool robustness"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-fossilrecord = "ussy_fossilrecord.cli:main"
fossil = "ussy_fossilrecord.legacy:deprecated_main"

[tool.hatch.build.targets.wheel]
packages = ["ussy_fossilrecord"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
