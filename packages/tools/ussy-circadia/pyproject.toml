[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ussy-circadia"
version = "0.1.0"
description = "Migrated from circadia"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "ussy-core",
]

[project.scripts]
ussy-circadia = "ussy_circadia.cli:main"
circadia = "ussy_circadia.legacy:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ussy_circadia"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
